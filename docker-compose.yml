version: '3.8'

services:
  stl10-classifier:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stl10-classification
    runtime: nvidia  # Enable NVIDIA GPU support
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WANDB_API_KEY=${WANDB_API_KEY:-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}
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      # Mount directories to persist data
      - ./models:/app/models
      - ./results:/app/results
      - ./wandb:/app/wandb
      - ./sample_data:/app/sample_data
      # Mount cache directories for faster subsequent runs
      - ~/.cache/huggingface:/home/appuser/.cache/huggingface
      - ~/.cache/torch:/home/appuser/.cache/torch
    networks:
      - ml-network
    restart: unless-stopped
    command: ["python", "run_experiment.py"]

  # Optional: Jupyter notebook service for interactive development
  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: stl10-jupyter
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - WANDB_API_KEY=${WANDB_API_KEY:-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}
    ports:
      - "8888:8888"
    volumes:
      - ./:/app
      - ~/.cache/huggingface:/home/appuser/.cache/huggingface
      - ~/.cache/torch:/home/appuser/.cache/torch
    networks:
      - ml-network
    command: ["jupyter", "notebook", "--ip=0.0.0.0", "--port=8888", "--no-browser", "--allow-root", "--NotebookApp.token=''"]
    profiles:
      - jupyter  # Optional service, activate with --profile jupyter

networks:
  ml-network:
    driver: bridge

